              outline: "#747686",

              "secondary-fixed": "#dae2fd",
              "primary-fixed": "#dce1ff",
              "on-surface-variant": "#434655",
              tertiary: "#414546",
              "surface-dim": "#cbdbf5",

              "surface-container": "#e5eeff",

              "surface-container-high": "#dce9ff",
              "on-primary-fixed": "#001551",
              background: "#f8f9ff",
              "surface-bright": "#f8f9ff",
              "surface-container-lowest": "#ffffff",
              "primary-fixed-dim": "#b7c4ff",
              primary: "#0037b0",
              "inverse-primary": "#b7c4ff",
              "surface-tint": "#2151da",
              "on-secondary-container": "#5c647a",
              "inverse-surface": "#213145",
              "on-primary-fixed-variant": "#0039b5",
              "on-tertiary-fixed": "#191c1e",
              "secondary-fixed-dim": "#bec6e0",
              "on-secondary": "#ffffff",
              "primary-container": "#1d4ed8",
              "inverse-on-surface": "#eaf1ff",
              "on-error-container": "#93000a",
              "on-primary": "#ffffff",
              "on-error": "#ffffff",
              "on-primary-container": "#cad3ff",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            spacing: {
              base: "4px",
              gutter: "24px",
              xs: "8px",
              xl: "48px",
              sm: "16px",
              md: "24px",
              "container-max": "1440px",
              lg: "32px",
            },
            fontFamily: {
              "label-md": ["Inter"],
              "body-md": ["Inter"],
              "body-lg": ["Inter"],
              "headline-lg": ["Inter"],
              "headline-md": ["Inter"],
              caption: ["Inter"],
            },
            fontSize: {
              "label-md": [
                "12px",
                {
                  lineHeight: "16px",
                  letterSpacing: "0.02em",
                  fontWeight: "600",
                },
              ],
              "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }],
              "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],

                "24px",

      };

    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      body {
        background-color: #f7f9fb;
      }
      .custom-scroll::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scroll::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="font-body-md text-on-surface">
    <!-- Side Navigation Bar -->
    <aside
      class="bg-[#0F172A] border-r border-outline-variant w-[240px] h-screen fixed left-0 top-0 flex flex-col py-6 z-50"
    >
      <div class="px-6 mb-10">
        <h1
          class="font-headline-md text-headline-md font-bold text-white tracking-tight leading-tight"
        >
          Welcome Back
          <br />EduSync Academy<br />
        </h1>
        <p id="sidebar-name" class="text-slate-400 text-[10px] font-caption mt-1">...</p>
      </div>
      <nav class="flex-1 px-2 space-y-1 overflow-y-auto custom-scroll">
        <a
          class="hover:text-white hover:bg-slate-800 text-white font-bold rounded-lg mx-2 my-1 flex items-center px-4 py-3 gap-3 transition-all opacity-90 shadow-md"
          href="student.html"
        >
          <span class="material-symbols-outlined" data-icon="home">home</span>
          <span class="font-body-md text-body-md">Home</span>
        </a>
        <a
          class="text-slate-300 bg-primary mx-2 my-1 flex items-center px-4 py-3 gap-3 transition-colors"
          href="student_courses.html"
        >
          <span class="material-symbols-outlined" data-icon="calendar_today"
            >calendar_today</span
          >
          <span class="font-body-md text-body-md">Courses</span>
        </a>
        <a
          class="text-slate-300 hover:text-white mx-2 my-1 flex items-center px-4 py-3 gap-3 hover:bg-slate-800 transition-colors"
          href="student_grades.html"
        >
          <span class="material-symbols-outlined" data-icon="grade">grade</span>
          <span class="font-body-md text-body-md">Grades</span>
        </a>
        <a
          class="text-slate-300 hover:text-white mx-2 my-1 flex items-center px-4 py-3 gap-3 hover:bg-slate-800 transition-colors"
          href="student_tuition.html"
        >
          <span class="material-symbols-outlined" data-icon="event_available"
            >event_available</span
          >
          <span class="font-body-md text-body-md">Tuition</span>
        </a>
      </nav>
      <div class="px-4 mt-auto pt-4 space-y-2">
        <button
          class="w-full bg-[#3b82f6] text-white flex items-center justify-center px-4 py-3 transition-colors rounded-lg mb-2 shadow-sm"
        >
          <span class="font-body-md text-body-md">Support Center</span>
        </button>
          <a
            href="login.html"
            class="w-full text-slate-400 hover:text-white flex items-center px-4 py-3 gap-3 hover:bg-slate-800 transition-colors rounded-lg cursor-pointer"
          >
            <span class="material-symbols-outlined" data-icon="logout">
              logout
            </span>
            <span class="font-body-md text-body-md">Log Out</span>
          </a>
      </div>
    </aside>
    <!-- Main Content Area -->
    <div class="flex-1 ml-[260px] flex flex-col min-h-screen">
      <!-- TopNavBar -->
      <header
        class="docked full-width top-0 bg-surface flex justify-between items-center h-16 px-lg z-10 border-b border-outline-variant/30"
      >
        <div class="font-headline-md text-headline-md text-on-surface">
          EduSync Academy
        </div>
        <div class="flex items-center gap-md">
          <!-- Profile Avatar -->
          <div
            class="w-8 h-8 rounded-full bg-surface-variant flex items-center justify-center border border-outline-variant overflow-hidden"
          >
            <img
              class="w-full h-full object-cover"
              data-alt="A small, professional circular avatar portrait of a young male student looking confident. Light mode UI setting with a clean background. Focus on a clear, approachable face suitable for an academic dashboard profile picture."
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuDiP_wPWJ5PhCMfufLU5JVQL18tWHil0I7CYFq5HQyc0nAa_pEqfKCLkOQuAy3VI7bjvJwgRuYqhQF39P8QmrtImeOOcAL1QTvNP8jN53DWlHNUxV_EcRlA75KO4m5rg5SXEiCspV7I-liJTVscbWepSa989VN6bGhuQ4PpfLslvWZ6-RcUIguCsdWMyfAM3iuNpTE2oJDzXXMwIg7MdIQvJYUvIM6DMMGVy2PZU0J85LMiJRw35UBexw"
            />
          </div>
        </div>
      </header>
      <!-- Page Content -->
      <main class="flex-1 p-lg max-w-container-max mx-auto w-full">
        <div class="mb-lg">
          <h2 class="font-display text-display text-on-surface mb-xs">
            Lớp học của tôi
          </h2>
          <p class="font-body-md text-body-md text-on-surface-variant">
            Manage and view details for all your enrolled courses.
          </p>
        </div>
        <!-- Filters -->
        <div class="flex flex-col md:flex-row gap-sm mb-lg">
          <div class="relative">
            <select
              class="appearance-none bg-surface border border-outline-variant rounded-lg py-sm pl-sm pr-xl text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none"
            >
              <option>Fall Semester 2023</option>
              <option>Spring Semester 2023</option>
            </select>
            <span
              class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none"
              >expand_more</span
            >
          </div>
          <div class="relative">
            <select
              class="appearance-none bg-surface border border-outline-variant rounded-lg py-sm pl-sm pr-xl text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none"
            >
              <option>All Subjects</option>
              <option>Computer Science</option>
              <option>Mathematics</option>
            </select>
            <span
              class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none"
              >expand_more</span
            >
          </div>
        </div>
        <!-- Class Grid -->
        <div id="courses-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-md">

        </div>
      </main>
    </div>
<script>
      document.addEventListener('DOMContentLoaded', async () => {
        // 1. Lấy ID của sinh viên từ Local Storage
        const userId = localStorage.getItem('userId');
        
        if (!userId) {
          window.location.href = 'login.html'; // Chuyển hướng nếu chưa đăng nhập
          return;
        }

        // ==========================================
        // 2. GỌI API LẤY THÔNG TIN SINH VIÊN (Cho Sidebar)
        // ==========================================
        try {
          const profileRes = await fetch(`http://localhost:3000/api/student/dashboard/${userId}`);
          if (profileRes.ok) {
            const student = await profileRes.json();
            // Gắn tên sinh viên vào Sidebar
            document.getElementById('sidebar-name').innerText = student.FullName;
          }
        } catch (error) {
          console.error('Lỗi khi tải thông tin sinh viên:', error);
        }

        // ==========================================
        // 3. GỌI API LẤY DANH SÁCH KHÓA HỌC
        // ==========================================
        try {
          const response = await fetch(`http://localhost:3000/api/student/${userId}/course-details`);
          
          if (response.ok) {
            const courses = await response.json();
            const gridContainer = document.getElementById('courses-grid');
            
            gridContainer.innerHTML = ''; // Xóa nội dung tĩnh cũ

            if (courses.length === 0) {
              gridContainer.innerHTML = '<p class="text-on-surface-variant font-body-md col-span-full">You are not enrolled in any courses.</p>';
              return;
            }

            const themes = [
              {
                badgeBg: 'bg-primary-fixed', badgeText: 'text-on-primary-fixed',
                iconBg: 'bg-surface-container-high', iconColor: 'text-primary', icon: 'database',
                barBg: 'bg-primary'
              },
              {
                badgeBg: 'bg-secondary-fixed', badgeText: 'text-on-secondary-fixed',
                iconBg: 'bg-secondary-container', iconColor: 'text-secondary', icon: 'code',
                barBg: 'bg-secondary'
              },
              {
                badgeBg: 'bg-primary-fixed-dim', badgeText: 'text-on-primary-fixed',
                iconBg: 'bg-surface-container', iconColor: 'text-primary', icon: 'language',
                barBg: 'bg-primary-container'
              },
              {
                badgeBg: 'bg-tertiary-fixed', badgeText: 'text-on-tertiary-fixed',
                iconBg: 'bg-tertiary-fixed-dim', iconColor: 'text-tertiary', icon: 'calculate',
                barBg: 'bg-tertiary'
              }
            ];

            courses.forEach((course, index) => {
              const theme = themes[index % themes.length];
              const scheduleText = course.ScheduleDays && course.StartTime ? `${course.ScheduleDays} ${course.StartTime}` : 'TBA';
              const teacherName = course.TeacherName || 'TBA';
              const room = course.Room || 'TBA';
              
              const cardHTML = `
                <div class="bg-surface-container-lowest rounded-xl p-md shadow-sm border border-outline-variant/50 flex flex-col hover:shadow-md transition-shadow">
                  <div class="flex justify-between items-start mb-md">
                    <div>
                      <span class="inline-block ${theme.badgeBg} ${theme.badgeText} text-label-sm font-label-sm px-xs py-base rounded uppercase mb-xs tracking-wide">
                        ${course.CourseID}
                      </span>
                      <h3 class="font-headline-md text-headline-md text-on-surface">
                        ${course.CourseName}
                      </h3>
                    </div>
                    <div class="w-10 h-10 rounded-full ${theme.iconBg} flex items-center justify-center ${theme.iconColor}">
                      <span class="material-symbols-outlined">${theme.icon}</span>
                    </div>
                  </div>
                  
                  <div class="space-y-xs mb-md">
                    <div class="flex items-center text-on-surface-variant font-body-md text-body-md">
                      <span class="material-symbols-outlined text-[18px] mr-xs">person</span>
                      ${teacherName}
                    </div>
                    <div class="flex items-center text-on-surface-variant font-body-md text-body-md">
                      <span class="material-symbols-outlined text-[18px] mr-xs">room</span>
                      Room ${room}
                    </div>
                    <div class="flex items-center text-on-surface-variant font-body-md text-body-md">
                      <span class="material-symbols-outlined text-[18px] mr-xs">schedule</span>
                      ${scheduleText}
                    </div>
                  </div>
                  
                  <div class="mt-auto pt-md border-t border-outline-variant/30">
                    <div class="flex justify-between text-label-md font-label-md text-on-surface mb-xs">
                      <span>Course Progress</span>
                      <span>${course.Progress}%</span>
                    </div>
                    <div class="w-full bg-surface-container-highest rounded-full h-2 mb-md">
                      <div class="${theme.barBg} h-2 rounded-full" style="width: ${course.Progress}%"></div>
                    </div>
                    <button class="w-full bg-surface border border-outline-variant text-on-surface font-label-md text-label-md py-sm rounded-lg hover:bg-surface-container-low transition-colors">
                      View Details
                    </button>
                  </div>
                </div>
              `;
              
              gridContainer.innerHTML += cardHTML;
            });
          }
        } catch (error) {
          console.error('Lỗi khi tải dữ liệu khóa học:', error);
        }
      });
    </script>
  </body>
</html>
